<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="label">Core palette</div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:3px;border-radius:14px;overflow:hidden;">
    <div style="background:#080F0F;border:1px solid #0F2020;padding:14px 12px;height:120px;display:flex;flex-direction:column;justify-content:flex-end;">
      <div style="font-size:13px;font-weight:700;color:#EDF4F4;">Deep Teal</div>
      <div class="mono" style="color:#9ABABA;opacity:.6;">#080F0F</div>
      <div style="font-size:10px;color:#1A3535;margin-top:2px;">background</div>
    </div>
    <div style="background:#0ABAB5;padding:14px 12px;height:120px;display:flex;flex-direction:column;justify-content:flex-end;">
      <div style="font-size:13px;font-weight:700;color:#04201F;">Tiffany</div>
      <div class="mono" style="color:rgba(8,15,15,.6);">#0ABAB5</div>
      <div style="font-size:10px;color:rgba(8,15,15,.6);margin-top:2px;">brand</div>
    </div>
    <div style="background:#81D8D0;padding:14px 12px;height:120px;display:flex;flex-direction:column;justify-content:flex-end;">
      <div style="font-size:13px;font-weight:700;color:#04201F;">Tiffany Light</div>
      <div class="mono" style="color:rgba(8,15,15,.6);">#81D8D0</div>
      <div style="font-size:10px;color:rgba(8,15,15,.6);margin-top:2px;">highlight</div>
    </div>
    <div style="background:#EC6088;padding:14px 12px;height:120px;display:flex;flex-direction:column;justify-content:flex-end;">
      <div style="font-size:13px;font-weight:700;color:#fff;">Rose Blush</div>
      <div class="mono" style="color:rgba(255,255,255,.7);">#EC6088</div>
      <div style="font-size:10px;color:rgba(255,255,255,.7);margin-top:2px;">accent</div>
    </div>
  </div>
</div>
</body></html>

<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="label">Neutrals — surfaces &amp; text on dark</div>
  <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:3px;border-radius:12px;overflow:hidden;">
    <div style="background:#080F0F;border:1px solid #0F2020;padding:10px;height:96px;display:flex;flex-direction:column;justify-content:flex-end;">
      <div style="font-size:11px;font-weight:700;color:#EDF4F4;">Deep Teal</div>
      <div class="mono" style="color:#9ABABA;opacity:.6;">#080F0F</div>
    </div>
    <div style="background:#0F2020;padding:10px;height:96px;display:flex;flex-direction:column;justify-content:flex-end;">
      <div style="font-size:11px;font-weight:700;color:#EDF4F4;">Surface</div>
      <div class="mono" style="color:#9ABABA;opacity:.6;">#0F2020</div>
    </div>
    <div style="background:#1A3535;padding:10px;height:96px;display:flex;flex-direction:column;justify-content:flex-end;">
      <div style="font-size:11px;font-weight:700;color:#EDF4F4;">Muted</div>
      <div class="mono" style="color:#9ABABA;opacity:.7;">#1A3535</div>
    </div>
    <div style="background:#2A4040;padding:10px;height:96px;display:flex;flex-direction:column;justify-content:flex-end;">
      <div style="font-size:11px;font-weight:700;color:#EDF4F4;">Muted 2</div>
      <div class="mono" style="color:#EDF4F4;opacity:.7;">#2A4040</div>
    </div>
    <div style="background:#9ABABA;padding:10px;height:96px;display:flex;flex-direction:column;justify-content:flex-end;">
      <div style="font-size:11px;font-weight:700;color:#080F0F;">Pearl 60</div>
      <div class="mono" style="color:rgba(8,15,15,.6);">#9ABABA</div>
    </div>
    <div style="background:#EDF4F4;padding:10px;height:96px;display:flex;flex-direction:column;justify-content:flex-end;">
      <div style="font-size:11px;font-weight:700;color:#080F0F;">Pearl</div>
      <div class="mono" style="color:rgba(8,15,15,.6);">#EDF4F4</div>
    </div>
  </div>
</div>
</body></html>

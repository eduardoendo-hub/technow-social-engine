<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="label">Semantic colors</div>
  <div style="display:flex;flex-direction:column;gap:6px;">
    <div style="display:flex;align-items:center;gap:14px;background:#06100F;border:1px solid #0F2020;border-radius:11px;padding:12px 14px;">
      <div style="width:32px;height:32px;border-radius:8px;background:#F7C948;flex-shrink:0;"></div>
      <div style="flex:1;"><div style="font-size:13px;font-weight:700;color:#F7C948;">Gold — warning</div><div style="font-size:11px;color:#9ABABA;opacity:.65;">Medium impact alerts. Pairs with teal without conflict.</div></div>
      <div class="mono" style="color:#1A3535;">#F7C948</div>
    </div>
    <div style="display:flex;align-items:center;gap:14px;background:#06100F;border:1px solid #0F2020;border-radius:11px;padding:12px 14px;">
      <div style="width:32px;height:32px;border-radius:8px;background:#30D158;flex-shrink:0;"></div>
      <div style="flex:1;"><div style="font-size:13px;font-weight:700;color:#30D158;">Go Green — success</div><div style="font-size:11px;color:#9ABABA;opacity:.65;">Live status, success states, "ON".</div></div>
      <div class="mono" style="color:#1A3535;">#30D158</div>
    </div>
    <div style="display:flex;align-items:center;gap:14px;background:#06100F;border:1px solid #0F2020;border-radius:11px;padding:12px 14px;">
      <div style="width:32px;height:32px;border-radius:8px;background:#EC6088;flex-shrink:0;"></div>
      <div style="flex:1;"><div style="font-size:13px;font-weight:700;color:#EC6088;">Rose — alert / breaking</div><div style="font-size:11px;color:#9ABABA;opacity:.65;">High-impact callouts, errors, the brand accent dot.</div></div>
      <div class="mono" style="color:#1A3535;">#EC6088</div>
    </div>
  </div>
</div>
</body></html>

<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="label">Avatar mark — TN</div>
  <div style="background:#06100F;border:1px solid #0F2020;border-radius:14px;padding:24px;display:flex;align-items:center;gap:28px;justify-content:center;min-height:170px;">
    <div style="width:120px;height:120px;border-radius:50%;background:linear-gradient(145deg,#0ABAB5 0%,#057572 100%);display:flex;align-items:center;justify-content:center;box-shadow:0 0 40px rgba(10,186,181,0.3);position:relative;">
      <span style="font-family:Inter,system-ui,sans-serif;font-weight:900;font-size:48px;letter-spacing:-4px;color:#080F0F;">TN</span>
      <span style="position:absolute;top:18px;right:22px;width:8px;height:8px;background:#EC6088;border-radius:50%;"></span>
    </div>
    <div style="width:72px;height:72px;border-radius:50%;background:linear-gradient(145deg,#0ABAB5 0%,#057572 100%);display:flex;align-items:center;justify-content:center;box-shadow:0 0 24px rgba(10,186,181,0.3);position:relative;">
      <span style="font-family:Inter,system-ui,sans-serif;font-weight:900;font-size:28px;letter-spacing:-2px;color:#080F0F;">TN</span>
      <span style="position:absolute;top:11px;right:14px;width:5px;height:5px;background:#EC6088;border-radius:50%;"></span>
    </div>
    <div style="width:40px;height:40px;border-radius:50%;background:linear-gradient(145deg,#0ABAB5 0%,#057572 100%);display:flex;align-items:center;justify-content:center;position:relative;">
      <span style="font-family:Inter,system-ui,sans-serif;font-weight:900;font-size:16px;letter-spacing:-1.5px;color:#080F0F;">TN</span>
    </div>
  </div>
</div>
</body></html>

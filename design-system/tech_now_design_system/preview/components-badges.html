<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="label">Badges &amp; chips</div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
    <span style="background:#EC6088;color:#fff;font-size:9px;font-weight:900;letter-spacing:2px;padding:4px 10px;border-radius:4px;text-transform:uppercase;">breaking</span>
    <span style="background:#30D158;color:#04201F;font-size:9px;font-weight:900;letter-spacing:2px;padding:4px 10px;border-radius:4px;text-transform:uppercase;">live</span>
    <span style="background:#F7C948;color:#04201F;font-size:9px;font-weight:900;letter-spacing:2px;padding:4px 10px;border-radius:4px;text-transform:uppercase;">new</span>
    <span style="background:rgba(10,186,181,0.12);color:#0ABAB5;border:1px solid rgba(10,186,181,0.35);font-size:10px;font-weight:700;padding:4px 10px;border-radius:99px;">AI · automation</span>
    <span style="background:transparent;color:#9ABABA;border:1px solid #1A3535;font-size:10px;font-weight:600;padding:4px 10px;border-radius:99px;">Today · 4 sources</span>
  </div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
    <span style="display:inline-flex;align-items:center;gap:6px;background:rgba(48,209,88,0.10);color:#30D158;border:1px solid rgba(48,209,88,0.30);font-size:11px;font-weight:700;padding:5px 12px;border-radius:99px;"><span style="width:6px;height:6px;background:#30D158;border-radius:50%;box-shadow:0 0 8px #30D158;"></span>Workflow active</span>
    <span style="display:inline-flex;align-items:center;gap:6px;background:rgba(247,201,72,0.10);color:#F7C948;border:1px solid rgba(247,201,72,0.30);font-size:11px;font-weight:700;padding:5px 12px;border-radius:99px;"><span style="width:6px;height:6px;background:#F7C948;border-radius:50%;"></span>Pending review</span>
    <span style="display:inline-flex;align-items:center;gap:6px;background:rgba(236,96,136,0.10);color:#EC6088;border:1px solid rgba(236,96,136,0.30);font-size:11px;font-weight:700;padding:5px 12px;border-radius:99px;"><span style="width:6px;height:6px;background:#EC6088;border-radius:50%;"></span>Failed</span>
  </div>
</div>
</body></html>

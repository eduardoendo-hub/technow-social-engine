<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="label">Gradients</div>
  <div style="display:flex;flex-direction:column;gap:14px;">
    <div>
      <div style="font-size:10px;color:#9ABABA;opacity:.6;margin-bottom:6px;letter-spacing:1px;text-transform:uppercase;">Duo — primary brand sweep</div>
      <div style="height:18px;border-radius:99px;background:linear-gradient(90deg,#0ABAB5 0%,#81D8D0 40%,#EC6088 100%);"></div>
    </div>
    <div>
      <div style="font-size:10px;color:#9ABABA;opacity:.6;margin-bottom:6px;letter-spacing:1px;text-transform:uppercase;">Brand depth — heroes &amp; headers</div>
      <div style="height:18px;border-radius:99px;background:linear-gradient(90deg,#04201F,#0ABAB5,#81D8D0);"></div>
    </div>
    <div>
      <div style="font-size:10px;color:#9ABABA;opacity:.6;margin-bottom:6px;letter-spacing:1px;text-transform:uppercase;">Alert — urgency</div>
      <div style="height:18px;border-radius:99px;background:linear-gradient(90deg,#F7C948,#EC6088);"></div>
    </div>
    <div>
      <div style="font-size:10px;color:#9ABABA;opacity:.6;margin-bottom:6px;letter-spacing:1px;text-transform:uppercase;">Brand line — top-edge accent</div>
      <div style="height:2px;background:linear-gradient(90deg,transparent,#0ABAB5 30%,#81D8D0 50%,#EC6088 70%,transparent);"></div>
    </div>
  </div>
</div>
</body></html>

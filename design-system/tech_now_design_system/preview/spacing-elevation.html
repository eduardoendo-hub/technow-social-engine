<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="label">Glow &amp; elevation</div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;">
    <div style="text-align:center;">
      <div style="height:96px;background:#0F2020;border-radius:14px;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 2px rgba(0,0,0,0.3);"><span style="font-size:11px;color:#9ABABA;opacity:.6;">shadow-1</span></div>
      <div class="mono" style="color:#9ABABA;opacity:.6;margin-top:8px;font-size:10px;">resting</div>
    </div>
    <div style="text-align:center;">
      <div style="height:96px;background:#0F2020;border-radius:14px;display:flex;align-items:center;justify-content:center;box-shadow:0 18px 48px -16px rgba(0,0,0,0.55);"><span style="font-size:11px;color:#9ABABA;opacity:.6;">shadow-card</span></div>
      <div class="mono" style="color:#9ABABA;opacity:.6;margin-top:8px;font-size:10px;">cards</div>
    </div>
    <div style="text-align:center;">
      <div style="height:96px;background:#0ABAB5;border-radius:14px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 24px rgba(10,186,181,0.5);"><span style="font-size:11px;color:#04201F;font-weight:700;">glow-tiffany</span></div>
      <div class="mono" style="color:#9ABABA;opacity:.6;margin-top:8px;font-size:10px;">brand glow</div>
    </div>
  </div>
</div>
</body></html>

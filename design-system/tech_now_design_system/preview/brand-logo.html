<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="label">Logo — Tech Now (primary)</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:3px;border-radius:14px;overflow:hidden;">
    <div style="background:#080F0F;border:1px solid #0F2020;padding:30px 24px;display:flex;align-items:center;justify-content:center;min-height:140px;">
      <div style="display:flex;align-items:center;font-family:Inter,system-ui,sans-serif;font-weight:900;letter-spacing:-2px;line-height:1;">
        <span style="color:#EDF4F4;font-size:48px;">Tech</span><span style="color:#0ABAB5;font-size:48px;">Now</span>
        <span style="width:10px;height:10px;background:#EC6088;border-radius:50%;margin-left:6px;margin-bottom:34px;box-shadow:0 0 12px rgba(236,96,136,0.8);"></span>
      </div>
    </div>
    <div style="background:#0ABAB5;padding:30px 24px;display:flex;align-items:center;justify-content:center;min-height:140px;">
      <div style="display:flex;align-items:center;font-family:Inter,system-ui,sans-serif;font-weight:900;letter-spacing:-2px;line-height:1;">
        <span style="color:#080F0F;font-size:48px;">Tech</span><span style="color:rgba(8,15,15,0.55);font-size:48px;">Now</span>
        <span style="width:10px;height:10px;background:#EC6088;border-radius:50%;margin-left:6px;margin-bottom:34px;"></span>
      </div>
    </div>
  </div>
</div>
</body></html>

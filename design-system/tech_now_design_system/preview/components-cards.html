<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="label">Card surfaces</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
    <div style="background:#06100F;border:1px solid #0F2020;border-radius:14px;padding:18px;">
      <div style="font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#0ABAB5;margin-bottom:8px;">Workflow</div>
      <div style="font-size:18px;font-weight:800;letter-spacing:-0.5px;color:#EDF4F4;line-height:1.15;margin-bottom:6px;">Lead enrichment + CRM sync</div>
      <div style="font-size:11px;color:#9ABABA;opacity:.6;line-height:1.5;">Triggered 142 times today · 99.1% success</div>
    </div>
    <div style="background:linear-gradient(145deg,#0ABAB5 0%,#057572 100%);border-radius:14px;padding:18px;color:#04201F;position:relative;overflow:hidden;">
      <div style="position:absolute;top:-30px;right:-30px;width:160px;height:160px;background:radial-gradient(circle,rgba(255,255,255,0.18) 0%,transparent 65%);"></div>
      <div style="font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:rgba(8,15,15,.55);margin-bottom:8px;">Featured</div>
      <div style="font-size:18px;font-weight:900;letter-spacing:-0.5px;line-height:1.15;margin-bottom:6px;">Automate your sales ops in 1 day.</div>
      <div style="font-size:11px;color:rgba(8,15,15,.65);line-height:1.5;">From discovery to deployment, no engineers required.</div>
    </div>
  </div>
</div>
</body></html>

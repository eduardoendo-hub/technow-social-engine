<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="label">Buttons</div>
  <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
    <button style="background:#0ABAB5;color:#04201F;border:none;padding:10px 22px;border-radius:99px;font-family:Inter,sans-serif;font-weight:700;font-size:13px;cursor:pointer;box-shadow:0 0 18px rgba(10,186,181,0.25);">Start free trial</button>
    <button style="background:transparent;color:#EDF4F4;border:1px solid #1A3535;padding:9px 20px;border-radius:99px;font-family:Inter,sans-serif;font-weight:700;font-size:13px;cursor:pointer;">Watch demo</button>
    <button style="background:#EC6088;color:#fff;border:none;padding:10px 22px;border-radius:99px;font-family:Inter,sans-serif;font-weight:800;font-size:13px;cursor:pointer;">Contact sales</button>
    <button style="background:#0F2020;color:#81D8D0;border:1px solid #1A3535;padding:9px 18px;border-radius:8px;font-family:Inter,sans-serif;font-weight:700;font-size:12px;cursor:pointer;">Run workflow →</button>
  </div>
  <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
    <button style="background:#057572;color:#EDF4F4;border:none;padding:8px 16px;border-radius:99px;font-family:Inter,sans-serif;font-weight:700;font-size:12px;opacity:.65;">Disabled</button>
    <button style="background:#0ABAB5;color:#04201F;border:none;padding:6px 14px;border-radius:6px;font-family:Inter,sans-serif;font-weight:700;font-size:11px;cursor:pointer;">Small</button>
    <button style="background:transparent;color:#0ABAB5;border:none;padding:6px 0;font-family:Inter,sans-serif;font-weight:700;font-size:13px;cursor:pointer;text-decoration:underline;text-underline-offset:4px;">Text link</button>
  </div>
</div>
</body></html>

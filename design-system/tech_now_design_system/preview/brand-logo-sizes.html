<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="label">Logo — sizes &amp; minimum</div>
  <div style="background:#06100F;border:1px solid #0F2020;border-radius:14px;padding:24px;display:flex;align-items:flex-end;gap:32px;justify-content:center;min-height:140px;">
    <div style="text-align:center;">
      <div style="display:flex;align-items:center;font-family:Inter,system-ui,sans-serif;font-weight:900;letter-spacing:-2px;line-height:1;">
        <span style="color:#EDF4F4;font-size:36px;">Tech</span><span style="color:#0ABAB5;font-size:36px;">Now</span>
        <span style="width:8px;height:8px;background:#EC6088;border-radius:50%;margin-left:5px;margin-bottom:25px;"></span>
      </div>
      <div class="mono" style="color:#1A3535;margin-top:10px;font-size:10px;">36px · default</div>
    </div>
    <div style="text-align:center;">
      <div style="display:flex;align-items:center;font-family:Inter,system-ui,sans-serif;font-weight:900;letter-spacing:-1.5px;line-height:1;">
        <span style="color:#EDF4F4;font-size:24px;">Tech</span><span style="color:#0ABAB5;font-size:24px;">Now</span>
        <span style="width:5px;height:5px;background:#EC6088;border-radius:50%;margin-left:3px;margin-bottom:17px;"></span>
      </div>
      <div class="mono" style="color:#1A3535;margin-top:10px;font-size:10px;">24px · UI</div>
    </div>
    <div style="text-align:center;">
      <div style="display:flex;align-items:center;font-family:Inter,system-ui,sans-serif;font-weight:900;letter-spacing:-1px;line-height:1;">
        <span style="color:#EDF4F4;font-size:14px;">Tech</span><span style="color:#0ABAB5;font-size:14px;">Now</span>
        <span style="width:3px;height:3px;background:#EC6088;border-radius:50%;margin-left:2px;margin-bottom:10px;"></span>
      </div>
      <div class="mono" style="color:#1A3535;margin-top:10px;font-size:10px;">14px · min</div>
    </div>
  </div>
</div>
</body></html>
